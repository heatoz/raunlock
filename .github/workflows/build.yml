name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: pyinstaller --onefile --add-data "patches;patches" --name raunlock patch.py

      - uses: actions/upload-artifact@v4
        with:
          name: raunlock-windows
          path: dist/raunlock.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: pyinstaller --onefile --add-data "patches:patches" --name raunlock patch.py

      - uses: actions/upload-artifact@v4
        with:
          name: raunlock-linux
          path: dist/raunlock

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: raunlock-windows
          path: artifacts/windows

      - uses: actions/download-artifact@v4
        with:
          name: raunlock-linux
          path: artifacts/linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: |
            artifacts/windows/raunlock.exe
            artifacts/linux/raunlock
