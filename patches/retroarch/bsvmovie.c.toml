# input/bsv/bsvmovie.c

[pause_hardcore_key_events]
match = '''
#ifdef HAVE_CHEEVOS
         rcheevos_pause_hardcore();
#endif
         k = handle->key_events[i];
'''
rewrite = '''
         // [PATCH] raunlock: allow BSV key event replay in hardcore mode
         k = handle->key_events[i];
'''

[pause_hardcore_read_state]
match = '''
#ifdef HAVE_CHEEVOS
      rcheevos_pause_hardcore();
#endif
      return bsv_result;
'''
rewrite = '''
      // [PATCH] raunlock: allow BSV movie read state in hardcore mode
      return bsv_result;
'''

[block_seek_to_frame]
match = '''
#ifdef HAVE_CHEEVOS
   if (rcheevos_hardcore_active())
      return false;
#endif
   if (!movie_find_checkpoint_before(input_st->bsv_movie_state_handle, frame, true,
'''
rewrite = '''
   // [PATCH] raunlock: allow movie seek in hardcore mode
   if (!movie_find_checkpoint_before(input_st->bsv_movie_state_handle, frame, true,
'''

[block_skip_to_next_checkpoint]
match = '''
#ifdef HAVE_CHEEVOS
   if (rcheevos_hardcore_active())
      return false;
#endif
   input_st->bsv_movie_state.flags |= BSV_FLAG_MOVIE_NEXT_CHECKPOINT;
'''
rewrite = '''
   // [PATCH] raunlock: allow movie skip-next in hardcore mode
   input_st->bsv_movie_state.flags |= BSV_FLAG_MOVIE_NEXT_CHECKPOINT;
'''

[block_skip_to_prev_checkpoint]
match = '''
#ifdef HAVE_CHEEVOS
   if (rcheevos_hardcore_active())
      return false;
#endif
   input_st->bsv_movie_state.flags |= BSV_FLAG_MOVIE_PREV_CHECKPOINT;
'''
rewrite = '''
   // [PATCH] raunlock: allow movie skip-prev in hardcore mode
   input_st->bsv_movie_state.flags |= BSV_FLAG_MOVIE_PREV_CHECKPOINT;
'''
