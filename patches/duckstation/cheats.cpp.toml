# src/core/cheats.cpp

[enumerate_cht_files_disk_hardcore_guard]
match = '''
    if (for_ui || !Achievements::IsHardcoreModeActive())
    {
      disk_patch_files = FindChtFilesOnDisk(serial, hash, cheats);
'''
rewrite = '''
    if (true) // [PATCH] raunlock: always load disk cheat files regardless of hardcore mode
    {
      disk_patch_files = FindChtFilesOnDisk(serial, hash, cheats);
'''

