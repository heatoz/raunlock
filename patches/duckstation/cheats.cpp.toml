[reload_patches_disk_files_hardcore_guard]
match = '''
        EnumerateChtFiles(serial, hash, false, false, !Achievements::IsHardcoreModeActive(), true,
                          [](const std::string& filename, const std::string& file_contents, bool from_database) {
                            ParseFile(&s_locals.patch_codes, file_contents);
                            if (s_locals.patch_codes.size() > 0)
                              INFO_LOG("Found {} game patches in {}.", s_locals.patch_codes.size(), filename);
                          });
'''
rewrite = '''
        EnumerateChtFiles(serial, hash, false, false, true, true, // [PATCH] raunlock: always load patches from disk
                          [](const std::string& filename, const std::string& file_contents, bool from_database) {
                            ParseFile(&s_locals.patch_codes, file_contents);
                            if (s_locals.patch_codes.size() > 0)
                              INFO_LOG("Found {} game patches in {}.", s_locals.patch_codes.size(), filename);
                          });
'''

[has_any_setting_overrides_disallow_check]
match = '''
      if (!code->GetMetadata().disallow_for_achievements || !hc_mode_active)
      {
        if (code->HasAnySettingOverrides())
          return true;
      }
'''
rewrite = '''
      // [PATCH] raunlock: allow setting overrides regardless of disallow_for_achievements
      if (code->HasAnySettingOverrides())
        return true;
'''

[apply_setting_overrides_disallow_check]
match = '''
        if (!code->GetMetadata().disallow_for_achievements || !hc_mode_active)
          code->ApplySettingOverrides();
'''
rewrite = '''
        // [PATCH] raunlock: apply setting overrides regardless of disallow_for_achievements
