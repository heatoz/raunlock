# src/core/hotkeys.cpp

[rewind_hardcore_confirm]
match = '''
    else if (Achievements::IsHardcoreModeActive())
    {
      // because this is keypress-based, don't enable it on accept
      Achievements::ConfirmHardcoreModeDisableAsync("Rewinding", {});
      return false;
    }
  }
  else
  {
    summary = TRANSLATE_STR("OSDMessage", "Rewinding is not enabled.");
  }
'''
rewrite = '''
  }
  else
  {
    summary = TRANSLATE_STR("OSDMessage", "Rewinding is not enabled.");
  }
'''

[toggle_overclocking_hardcore_guard]
match = '''
     if (!pressed && System::IsValid() && !Achievements::IsHardcoreModeActive())
     {
       g_settings.cpu_overclock_enable = !g_settings.cpu_overclock_enable;
'''
rewrite = '''
     if (!pressed && System::IsValid())
     {
       // [PATCH] raunlock: allow overclocking toggle in hardcore mode
       g_settings.cpu_overclock_enable = !g_settings.cpu_overclock_enable;
'''

[decrease_speed_hardcore_floor]
match = '''
       g_settings.emulation_speed =
         std::max(g_settings.emulation_speed - 0.1f, Achievements::IsHardcoreModeActive() ? 1.0f : 0.1f);
'''
rewrite = '''
       g_settings.emulation_speed =
         std::max(g_settings.emulation_speed - 0.1f, 0.1f); // [PATCH] raunlock: no hardcore speed floor
'''

[reset_speed_hardcore_floor]
match = '''
       g_settings.emulation_speed = std::max(Core::GetFloatSettingValue("Main", "EmulationSpeed", 1.0f),
                                             Achievements::IsHardcoreModeActive() ? 1.0f : 0.1f);
'''
rewrite = '''
       g_settings.emulation_speed = std::max(Core::GetFloatSettingValue("Main", "EmulationSpeed", 1.0f),
                                             0.1f); // [PATCH] raunlock: no hardcore speed floor
'''

[freecam_toggle_hardcore_guard]
match = '''
     if (!pressed && !Achievements::IsHardcoreModeActive())
       GTE::SetFreecamEnabled(!GTE::IsFreecamEnabled());
'''
rewrite = '''
     if (!pressed) // [PATCH] raunlock: allow freecam in hardcore mode
       GTE::SetFreecamEnabled(!GTE::IsFreecamEnabled());
'''

[freecam_reset_hardcore_guard]
match = '''
