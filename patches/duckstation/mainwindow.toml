# src/duckstation-qt/mainwindow.cpp

[enable_cheats_toolbar_in_hardcore]
match = '''
  m_ui.actionCheatsToolbar->setDisabled(starting_or_not_running || achievements_hardcore_mode);
'''
rewrite = '''
  m_ui.actionCheatsToolbar->setDisabled(starting_or_not_running); // [PATCH] unblockh: cheats toolbar always available
'''

[enable_cheats_menu_in_hardcore]
match = '''
  m_ui.menuCheats->menuAction()->setDisabled(starting_or_not_running || achievements_hardcore_mode);
  m_ui.menuCheats->setDisabled(starting_or_not_running || achievements_hardcore_mode);
'''
rewrite = '''
  m_ui.menuCheats->menuAction()->setDisabled(starting_or_not_running); // [PATCH] unblockh: cheats menu always available
  m_ui.menuCheats->setDisabled(starting_or_not_running);
'''

[enable_debugger_tools_in_hardcore]
match = '''
  m_ui.actionCPUDebugger->setDisabled(achievements_hardcore_mode);
  m_ui.actionMemoryEditor->setDisabled(achievements_hardcore_mode);
  m_ui.actionMemoryScanner->setDisabled(achievements_hardcore_mode);
  m_ui.actionFreeCamera->setDisabled(achievements_hardcore_mode);
'''
rewrite = '''
  m_ui.actionCPUDebugger->setDisabled(false); // [PATCH] unblockh: debug tools always available
  m_ui.actionMemoryEditor->setDisabled(false);
  m_ui.actionMemoryScanner->setDisabled(false);
  m_ui.actionFreeCamera->setDisabled(false);
'''

[enable_dump_actions_in_hardcore]
match = '''
  m_ui.actionDumpRAM->setDisabled(starting_or_not_running || achievements_hardcore_mode);
  m_ui.actionDumpVRAM->setDisabled(starting_or_not_running || achievements_hardcore_mode);
  m_ui.actionDumpSPURAM->setDisabled(starting_or_not_running || achievements_hardcore_mode);
'''
rewrite = '''
  m_ui.actionDumpRAM->setDisabled(starting_or_not_running); // [PATCH] unblockh: dump actions always available
  m_ui.actionDumpVRAM->setDisabled(starting_or_not_running);
  m_ui.actionDumpSPURAM->setDisabled(starting_or_not_running);
'''

[enable_resume_last_state_in_hardcore]
match = '''
  m_ui.actionResumeLastState->setDisabled(starting_or_running || achievements_hardcore_mode);
'''
rewrite = '''
  m_ui.actionResumeLastState->setDisabled(starting_or_running); // [PATCH] unblockh: resume last state always available
'''

# O menu de contexto da game list também desabilita load state per-slot em modo hardcore
[enable_game_list_load_state_in_hardcore]
match = '''
        action->setDisabled(s_locals.achievements_hardcore_mode);
'''
rewrite = '''
        // [PATCH] unblockh: load state slots always enabled in game list context menu
        action->setDisabled(false);
'''
