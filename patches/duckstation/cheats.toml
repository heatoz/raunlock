# src/core/cheats.cpp

[allow_cheats_in_hardcore]
match = '''
bool Cheats::AreCheatsEnabled()
{
  if (Achievements::IsHardcoreModeActive() || g_settings.disable_all_enhancements)
    return false;

  :[_]
}
'''
rewrite = '''
bool Cheats::AreCheatsEnabled()
{
  // [PATCH] unblockh: removed hardcore mode check — cheats allowed regardless
  if (g_settings.disable_all_enhancements)
    return false;

  :[_]
}
'''

[allow_disk_patches_in_hardcore]
match = '''
    if (for_ui || !Achievements::IsHardcoreModeActive())
    {
      disk_patch_files = FindChtFilesOnDisk(serial, hash, cheats);
'''
rewrite = '''
    if (true) // [PATCH] unblockh: always load disk patch files regardless of hardcore mode
    {
      disk_patch_files = FindChtFilesOnDisk(serial, hash, cheats);
'''

[allow_patch_files_from_disk_in_update]
match = '''
        EnumerateChtFiles(serial, hash, false, false, !Achievements::IsHardcoreModeActive(), true,
'''
rewrite = '''
        EnumerateChtFiles(serial, hash, false, false, true, true, // [PATCH] unblockh: always load patches from disk in hardcore
'''

[allow_disallowed_patches_in_enable]
match = '''
    // don't load banned patches
    if (p->GetMetadata().disallow_for_achievements && hc_mode_active)
      continue;
'''
rewrite = '''
    // [PATCH] unblockh: removed disallow_for_achievements gate — all patches allowed in hardcore
'''

[allow_disallowed_widescreen_in_enable]
match = '''
    // don't load banned patches
    if (p->GetMetadata().disallow_for_achievements && hc_mode_active)
      continue;

    // already enabled?
'''
rewrite = '''
    // [PATCH] unblockh: removed disallow_for_achievements gate for widescreen patches

    // already enabled?
'''

[allow_disallowed_in_has_setting_overrides]
match = '''
        if (!code->GetMetadata().disallow_for_achievements || !hc_mode_active)
        {
          if (code->HasAnySettingOverrides())
            return true;
        }
'''
rewrite = '''
        // [PATCH] unblockh: always check setting overrides regardless of hardcore mode
        if (code->HasAnySettingOverrides())
          return true;
'''

[allow_disallowed_in_apply_setting_overrides]
match = '''
        if (!code->GetMetadata().disallow_for_achievements || !hc_mode_active)
          code->ApplySettingOverrides();
'''
rewrite = '''
        // [PATCH] unblockh: always apply setting overrides regardless of hardcore mode
        code->ApplySettingOverrides();
'''
